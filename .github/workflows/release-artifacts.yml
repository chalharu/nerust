name: Release artifacts
on:
  pull_request:
    branches: [release]
  release:
    types: [published]
env:
  CARGO_TERM_COLOR: always
jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.pull_request.head.sha }}
      - name: Read release metadata
        id: release_meta
        run: python3 packaging/release/release_flow.py workspace-metadata >> "$GITHUB_OUTPUT"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-x86_64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh x86_64
      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-x86_64
          path: target/dist/nerust-${{ steps.release_meta.outputs.tag_name }}-linux-x86_64.tar.gz
          if-no-files-found: error
  linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.pull_request.head.sha }}
      - name: Read release metadata
        id: release_meta
        run: python3 packaging/release/release_flow.py workspace-metadata >> "$GITHUB_OUTPUT"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-aarch64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh aarch64
      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-aarch64
          path: target/dist/nerust-${{ steps.release_meta.outputs.tag_name }}-linux-aarch64.tar.gz
          if-no-files-found: error
  macos-aarch64:
    name: macOS aarch64
    runs-on: macos-26
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.pull_request.head.sha }}
      - name: Read release metadata
        id: release_meta
        run: python3 packaging/release/release_flow.py workspace-metadata >> "$GITHUB_OUTPUT"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-apple-darwin
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-release-aarch64-
      - name: Build nerust_tao (release, aarch64)
        run: cargo build -p nerust_tao --release --target aarch64-apple-darwin
      - name: Package .app bundle
        env:
          BINARY: target/aarch64-apple-darwin/release/nerust_tao
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          chmod +x packaging/macos/build-app.sh
          packaging/macos/build-app.sh
      - name: Upload bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-aarch64
          path: target/dist/nerust-${{ steps.release_meta.outputs.tag_name }}-macos-aarch64.app.zip
          if-no-files-found: error
  assemble-assets:
    name: Assemble release assets
    needs: [linux-x86_64, linux-aarch64, macos-aarch64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist/
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist/ -type f -exec mv -- {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate SHA-256 checksums
        env:
          TAG_NAME: ${{ needs.linux-x86_64.outputs.tag_name }}
        working-directory: release-assets
        run: |
          for file in \
            "nerust-${TAG_NAME}-linux-x86_64.tar.gz" \
            "nerust-${TAG_NAME}-linux-aarch64.tar.gz" \
            "nerust-${TAG_NAME}-macos-aarch64.app.zip"
          do
            sha256sum "${file}" > "${file}.sha256"
            cat "${file}.sha256"
          done
      - name: Upload assembled assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-assets-${{ needs.linux-x86_64.outputs.tag_name }}
          path: |
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-linux-x86_64.tar.gz
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-linux-x86_64.tar.gz.sha256
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-linux-aarch64.tar.gz
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-linux-aarch64.tar.gz.sha256
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-macos-aarch64.app.zip
            release-assets/nerust-${{ needs.linux-x86_64.outputs.tag_name }}-macos-aarch64.app.zip.sha256
          if-no-files-found: error
  publish-assets:
    if: ${{ github.event_name == 'release' }}
    name: Publish release assets
    needs: [assemble-assets, linux-x86_64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download assembled assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets-${{ needs.linux-x86_64.outputs.tag_name }}
          path: release-assets/
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.linux-x86_64.outputs.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" \
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz" \
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz.sha256" \
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz" \
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz.sha256" \
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip" \
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip.sha256" \
            --repo "${GH_REPO}" \
            --clobber
  sync-release:
    if: ${{ github.event_name == 'release' }}
    name: Sync release back to master
    needs: [publish-assets, linux-x86_64]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Read release metadata
        id: release_meta
        run: python3 packaging/release/release_flow.py workspace-metadata >> "$GITHUB_OUTPUT"
      - name: Verify release branch tip matches published commit
        run: |
          git fetch origin release
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/release)" ]; then
            echo "release branch advanced past the published commit" >&2
            exit 1
          fi
      - name: Create or update sync PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          git fetch origin master
          if [ "$(git rev-list --count origin/master..HEAD)" -eq 0 ]; then
            exit 0
          fi
          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          ## Summary
          - sync \`${TAG_NAME}\` metadata back to \`master\`
          - keep \`master\` aligned with the published \`release\` branch contents

          ## Notes
          - this PR carries the version and changelog state from \`release\`
          EOF
          pr_number="$(gh pr list --head release --base master --state open --json number --jq '.[0].number')"
          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" --title "chore(release): sync ${TAG_NAME} to master" --body-file "${body_file}"
          else
            gh pr create --base master --head release --title "chore(release): sync ${TAG_NAME} to master" --body-file "${body_file}"
          fi
          rm -f "${body_file}"

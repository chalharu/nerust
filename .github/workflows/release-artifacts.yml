# yamllint disable rule:line-length
name: Release artifacts
on:
  pull_request:
    branches: [master]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
      tag_name:
        description: Override artifact tag name
        required: false
        type: string
  workflow_call:
    inputs:
      publish_release:
        required: true
        type: boolean
      ref:
        required: false
        type: string
      version:
        required: false
        type: string
      tag_name:
        required: false
        type: string
    secrets:
      ANDROID_CERTIFICATE:
        required: false
      ANDROID_PRIVATE_KEY:
        required: false
      ANDROID_PRIVATE_KEY_PASSWORD:
        required: false
env:
  CARGO_TERM_COLOR: always
jobs:
  prepare-context:
    name: Prepare artifact context
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.context.outputs.should_run }}
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      version: ${{ steps.context.outputs.version }}
      tag_name: ${{ steps.context.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.ref || github.sha }}
      - name: Resolve artifact context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version || '' }}
          INPUT_TAG_NAME: ${{ inputs.tag_name || '' }}
          RELEASE_TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          PR_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
          PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          should_run=true
          if [[ "${EVENT_NAME}" == "pull_request" && "${PR_BASE_REF}" == "master" ]]; then
            should_run=false
            while IFS= read -r path; do
              case "${path}" in
                .github/workflows/*|packaging/*|Cargo.toml|Cargo.lock|README.md|LICENSE|renovate.json)
                  should_run=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "${PR_BASE_SHA}...${PR_HEAD_SHA}")
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          if [[ "${should_run}" != "true" ]]; then
            exit 0
          fi

          version=""
          checkout_ref="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"

          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          fi

          case "${EVENT_NAME}" in
            release)
              tag_name="${INPUT_TAG_NAME:-${RELEASE_TAG_NAME}}"
              ;;
            workflow_call)
              tag_name="${INPUT_TAG_NAME:-${GITHUB_REF_NAME}}"
              ;;
            push)
              tag_name="${INPUT_TAG_NAME:-${GITHUB_REF_NAME}}"
              ;;
            workflow_dispatch)
              tag_name="${INPUT_TAG_NAME:-}"
              ;;
            pull_request)
              tag_name=""
              ;;
            *)
              echo "unexpected event type: ${EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -n "${tag_name}" && "${tag_name}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
          fi

          if [[ -z "${version}" ]]; then
            mapfile -t release_meta < <(bash packaging/release/release_flow.sh workspace-metadata)
            for line in "${release_meta[@]}"; do
              echo "${line}" >> "$GITHUB_OUTPUT"
              case "${line}" in
                version=*)
                  version="${line#version=}"
                  ;;
              esac
            done
          fi

          if [[ -z "${tag_name}" ]]; then
            case "${EVENT_NAME}" in
              workflow_dispatch)
                tag_name="v${version}-validate-manual-${short_sha}"
                ;;
              pull_request)
                tag_name="v${version}-validate-pr${PR_NUMBER}-${short_sha}"
                ;;
              *)
                echo "unexpected event type: ${EVENT_NAME}" >&2
                exit 1
                ;;
            esac
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
  linux-x86_64:
    name: Linux x86_64
    needs: [prepare-context]
    if: ${{ needs.prepare-context.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag_name: ${{ needs.prepare-context.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-context.outputs.checkout_ref }}
      - name: Update Cargo.toml version
        env:
          VERSION: ${{ needs.prepare-context.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Restore Cargo registry and build cache
        id: cargo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-x86_64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        env:
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh x86_64
      - name: Save Cargo registry and build cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}
      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x86_64
          path: target/dist/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-x86_64.tar.gz
          if-no-files-found: error
  linux-aarch64:
    name: Linux aarch64
    needs: [prepare-context]
    if: ${{ needs.prepare-context.outputs.should_run == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-context.outputs.checkout_ref }}
      - name: Update Cargo.toml version
        env:
          VERSION: ${{ needs.prepare-context.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Restore Cargo registry and build cache
        id: cargo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-aarch64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        env:
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh aarch64
      - name: Save Cargo registry and build cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}
      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-aarch64
          path: target/dist/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-aarch64.tar.gz
          if-no-files-found: error
  macos-aarch64:
    name: macOS aarch64
    needs: [prepare-context]
    if: ${{ needs.prepare-context.outputs.should_run == 'true' }}
    runs-on: macos-26
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-context.outputs.checkout_ref }}
      - name: Update Cargo.toml version
        env:
          VERSION: ${{ needs.prepare-context.outputs.version }}
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
      - name: Restore Cargo registry and build cache
        id: cargo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-release-aarch64-
      - name: Build nerust_tao (release, aarch64)
        run: cargo build -p nerust_tao --release --target aarch64-apple-darwin
      - name: Package .app bundle
        env:
          BINARY: target/aarch64-apple-darwin/release/nerust_tao
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
          VERSION: ${{ needs.prepare-context.outputs.version }}
        run: |
          chmod +x packaging/macos/build-app.sh
          packaging/macos/build-app.sh
      - name: Save Cargo registry and build cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}
      - name: Upload bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-aarch64
          path: target/dist/nerust-${{ needs.prepare-context.outputs.tag_name }}-macos-aarch64.app.zip
          if-no-files-found: error
  android-arm64-v8a:
    name: Android arm64-v8a
    needs: [prepare-context]
    if: ${{ needs.prepare-context.outputs.should_run == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-context.outputs.checkout_ref }}
      - name: Update Cargo.toml version
        env:
          VERSION: ${{ needs.prepare-context.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          targets: aarch64-linux-android
          toolchain: stable
      - name: Install cargo-ndk
        run: |
          chmod +x packaging/android/install-cargo-ndk.sh
          packaging/android/install-cargo-ndk.sh
      - name: Restore Cargo registry and build cache
        id: cargo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-android-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-android-arm64-
      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('packaging/android/gradle/wrapper/gradle-wrapper.properties', 'packaging/android/build.gradle.kts', 'packaging/android/app/build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-android-
      - name: Package Android APK
        env:
          ANDROID_CERTIFICATE: ${{ secrets.ANDROID_CERTIFICATE }}
          ANDROID_PRIVATE_KEY: ${{ secrets.ANDROID_PRIVATE_KEY }}
          ANDROID_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_PRIVATE_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ needs.prepare-context.outputs.version }}
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        run: |
          chmod +x packaging/android/package.sh packaging/android/gradlew
          packaging/android/package.sh
      - name: Save Cargo registry and build cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}
      - name: Save Gradle cache
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.gradle-cache.outputs.cache-primary-key }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-arm64-v8a
          path: |
            target/dist/nerust-${{ needs.prepare-context.outputs.tag_name }}-android-arm64-v8a.apk
            target/dist/nerust-${{ needs.prepare-context.outputs.tag_name }}-android-arm64-v8a.apk.sha256
          if-no-files-found: error
  assemble-assets:
    name: Assemble release assets
    needs: [prepare-context, linux-x86_64, linux-aarch64, macos-aarch64, android-arm64-v8a]
    if: ${{ needs.prepare-context.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist/ -type f -exec mv -- {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate SHA-256 checksums
        env:
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        working-directory: release-assets
        run: |
          for file in \
            "nerust-${TAG_NAME}-linux-x86_64.tar.gz" \
            "nerust-${TAG_NAME}-linux-aarch64.tar.gz" \
            "nerust-${TAG_NAME}-macos-aarch64.app.zip" \
            "nerust-${TAG_NAME}-android-arm64-v8a.apk"
          do
            sha256sum "${file}" > "${file}.sha256"
            cat "${file}.sha256"
          done
      - name: Upload assembled assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ needs.prepare-context.outputs.tag_name }}
          path: |
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-x86_64.tar.gz
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-x86_64.tar.gz.sha256
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-aarch64.tar.gz
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-linux-aarch64.tar.gz.sha256
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-macos-aarch64.app.zip
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-macos-aarch64.app.zip.sha256
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-android-arm64-v8a.apk
            release-assets/nerust-${{ needs.prepare-context.outputs.tag_name }}-android-arm64-v8a.apk.sha256
          if-no-files-found: error
  publish-assets:
    if: ${{ github.event_name == 'release' || inputs.publish_release }}
    name: Publish release assets
    needs: [assemble-assets, prepare-context]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download assembled assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ needs.prepare-context.outputs.tag_name }}
          path: release-assets/
      - name: Upload assets to GitHub Release
        env:
          CHECKOUT_REF: ${{ needs.prepare-context.outputs.checkout_ref }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        run: |
          release_target="$(gh api "repos/${GH_REPO}/releases/tags/${TAG_NAME}" --jq '.target_commitish')"
          if [[ "${release_target}" != "${CHECKOUT_REF}" ]]; then
            echo "release tag target ${release_target} does not match build commit ${CHECKOUT_REF}" >&2
            exit 1
          fi
          mapfile -t existing_assets < <(gh release view "${TAG_NAME}" --repo "${GH_REPO}" --json assets --jq '.assets[].name')
          release_files=(
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz"
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz.sha256"
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz"
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz.sha256"
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip"
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip.sha256"
            "release-assets/nerust-${TAG_NAME}-android-arm64-v8a.apk"
            "release-assets/nerust-${TAG_NAME}-android-arm64-v8a.apk.sha256"
          )
          upload_args=()
          for file in "${release_files[@]}"; do
            asset_name="$(basename "${file}")"
            already_uploaded=false
            for existing_asset in "${existing_assets[@]}"; do
              if [[ "${existing_asset}" == "${asset_name}" ]]; then
                already_uploaded=true
                break
              fi
            done
            if [[ "${already_uploaded}" == "true" ]]; then
              continue
            fi
            upload_args+=("${file}")
          done
          if [[ "${#upload_args[@]}" -eq 0 ]]; then
            exit 0
          fi
          gh release upload "${TAG_NAME}" "${upload_args[@]}" --repo "${GH_REPO}"
  publish-release:
    if: ${{ github.event_name == 'release' || inputs.publish_release }}
    name: Publish GitHub release
    needs: [publish-assets, prepare-context]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-context.outputs.tag_name }}
        run: |
          gh release edit "${TAG_NAME}" --repo "${GH_REPO}" --draft=false

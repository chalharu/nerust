name: Release artifacts
on:
  release:
    types: [published]
env:
  CARGO_TERM_COLOR: always
  TAG_NAME: ${{ github.event.release.tag_name }}
jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-x86_64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh x86_64
      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-x86_64
          path: target/dist/nerust-${{ env.TAG_NAME }}-linux-x86_64.tar.gz
          if-no-files-found: error
  linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-aarch64-
      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release
      - name: Package tarball
        run: |
          chmod +x packaging/linux/package.sh
          packaging/linux/package.sh aarch64
      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: linux-aarch64
          path: target/dist/nerust-${{ env.TAG_NAME }}-linux-aarch64.tar.gz
          if-no-files-found: error
  macos-aarch64:
    name: macOS aarch64
    runs-on: macos-26
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-apple-darwin
      - name: Cache Cargo registry and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-release-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-release-aarch64-
      - name: Build nerust_tao (release, aarch64)
        run: cargo build -p nerust_tao --release --target aarch64-apple-darwin
      - name: Package .app bundle
        env:
          BINARY: target/aarch64-apple-darwin/release/nerust_tao
        run: |
          chmod +x packaging/macos/build-app.sh
          packaging/macos/build-app.sh
      - name: Upload bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-aarch64
          path: target/dist/nerust-${{ env.TAG_NAME }}-macos-aarch64.app.zip
          if-no-files-found: error
  upload:
    name: Upload release assets
    needs: [linux-x86_64, linux-aarch64, macos-aarch64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist/
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist/ -type f -exec mv -- {} release-assets/ \;
          ls -lh release-assets/
      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: |
          for file in \
            "nerust-${TAG_NAME}-linux-x86_64.tar.gz" \
            "nerust-${TAG_NAME}-linux-aarch64.tar.gz" \
            "nerust-${TAG_NAME}-macos-aarch64.app.zip"
          do
            sha256sum "${file}" > "${file}.sha256"
            cat "${file}.sha256"
          done
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG_NAME}" \
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz" \
            "release-assets/nerust-${TAG_NAME}-linux-x86_64.tar.gz.sha256" \
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz" \
            "release-assets/nerust-${TAG_NAME}-linux-aarch64.tar.gz.sha256" \
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip" \
            "release-assets/nerust-${TAG_NAME}-macos-aarch64.app.zip.sha256" \
            --repo "${{ github.repository }}" \
            --clobber

name: Build CI Image
on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
permissions: {}
jobs:
  ensure:
    name: Ensure CI image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Resolve CI image
        id: image
        run: |
          COMMIT_SHA="${{ github.sha }}"
          IMAGE_NAME="ghcr.io/chalharu/nerust-ci"
          TARGET_TAG="sha-${COMMIT_SHA}"

          MATCHING_TAG=""
          VERSIONS=$(gh api "/orgs/chalharu/packages/container/nerust-ci/versions?per_page=100" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || true)

          if [[ -n "$VERSIONS" ]]; then
            for tag in $VERSIONS; do
              candidate="${tag#sha-}"
              [[ ! "$candidate" =~ ^[0-9a-f]{40}$ ]] && continue
              git cat-file -t "$candidate" >/dev/null 2>&1 || continue
              if git diff --quiet "$candidate" HEAD -- .github/workflows/Dockerfile .github/workflows/build-ci-image.yaml; then
                echo "Found matching image from commit $candidate"
                MATCHING_TAG="$tag"
                break
              fi
            done
          fi

          if [[ -n "$MATCHING_TAG" ]]; then
            echo "Reusing image ${IMAGE_NAME}:${MATCHING_TAG}"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "tag=${MATCHING_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TARGET_TAG}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        if: steps.image.outputs.needs_build == 'true'
        with:
          context: .
          file: .github/workflows/Dockerfile
          push: true
          tags: ghcr.io/chalharu/nerust-ci:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_WORKSPACE=${{ github.workspace }}
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    needs: ensure
    permissions:
      contents: read
    with:
      ci-image-tag: ${{ needs.ensure.outputs.image-tag }}
  sonarcloud:
    name: SonarCloud
    uses: ./.github/workflows/sonarcloud.yaml
    needs: ensure
    permissions:
      contents: read
      pull-requests: read
    with:
      ci-image-tag: ${{ needs.ensure.outputs.image-tag }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

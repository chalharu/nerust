name: Build CI Image
on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  ensure:
    name: Ensure CI image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Resolve CI image
        id: image
        run: |
          COMMIT_SHA="${{ github.sha }}"
          IMAGE_NAME="ghcr.io/chalharu/nerust-ci"
          TARGET_TAG="sha-${COMMIT_SHA}"

          # Fetch existing tags from GHCR
          BASE_COMMIT=""
          VERSIONS=$(gh api "/orgs/chalharu/packages/container/nerust-ci/versions?per_page=100" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || true)

          if [[ -n "$VERSIONS" ]]; then
            for tag in $VERSIONS; do
              candidate="${tag#sha-}"
              [[ ! "$candidate" =~ ^[0-9a-f]{40}$ ]] && continue
              git cat-file -t "$candidate" >/dev/null 2>&1 || continue
              git merge-base --is-ancestor "$candidate" HEAD || continue
              if [[ -z "$BASE_COMMIT" ]] || git merge-base --is-ancestor "$BASE_COMMIT" "$candidate"; then
                BASE_COMMIT="$candidate"
              fi
            done
          fi

          build_needed=true
          if [[ -n "$BASE_COMMIT" ]]; then
            echo "Found base commit: $BASE_COMMIT"
            if git diff --quiet "$BASE_COMMIT" HEAD -- .github/workflows/Dockerfile .github/workflows/build-ci-image.yaml; then
              echo "No Dockerfile changes since $BASE_COMMIT"
              build_needed=false
            fi
          fi

          if $build_needed; then
            echo "Building CI image for $COMMIT_SHA"
            docker buildx build \
              --file .github/workflows/Dockerfile \
              --tag "${IMAGE_NAME}:${TARGET_TAG}" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push \
              .
          else
            # Tag existing image from base commit to target tag
            echo "Reusing image from $BASE_COMMIT for $COMMIT_SHA"
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:${TARGET_TAG}" \
              "${IMAGE_NAME}:sha-${BASE_COMMIT}"
          fi

          echo "tag=${TARGET_TAG}" >> "$GITHUB_OUTPUT"
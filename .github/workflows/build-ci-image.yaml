name: Build CI Image
on:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect Dockerfile changes
        id: diff
        run: |
          changed_files=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE" --depth=1
            changed_files=$(git diff --name-only "origin/$BASE"...HEAD -- .github/workflows/Dockerfile .github/workflows/build-ci-image.yaml)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            changed_files="manual"
          fi
          if [[ -n "$changed_files" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
  build:
    name: Build and push
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .github/workflows/Dockerfile
          push: true
          tags: ghcr.io/chalharu/nerust-ci:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

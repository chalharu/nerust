name: Build CI Image
on:
  create:
  push:
    branches:
      - master
    paths:
      - Dockerfile
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    name: Build and push
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce4c0d1e5d4e67c3e0f0fa3086ae8f5b7e8e7 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@327cd5a69de6c009b9ce71bce8395f28e651bf99 # v3.9.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@ca8779c5d6a71dc0a3f3f3e20b0a0f0a4a0a0a0a # v6.15.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/chalharu/nerust-ci:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

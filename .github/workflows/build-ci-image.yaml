name: Build CI Image
on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
permissions: {}
jobs:
  build:
    name: Build (${{ matrix.platform.target }})
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: linux/amd64
            tag_suffix: amd64
          - runner: ubuntu-24.04-arm
            target: linux/arm64
            tag_suffix: arm64
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .github/workflows/Dockerfile
          platforms: ${{ matrix.platform.target }}
          push: true
          tags: ghcr.io/chalharu/nerust-ci:${{ inputs.image-tag }}-${{ matrix.platform.tag_suffix }}
          cache-from: type=gha,scope=ci-image-${{ matrix.platform.tag_suffix }}
          cache-to: type=gha,mode=max,scope=ci-image-${{ matrix.platform.tag_suffix }}
          build-args: |
            GITHUB_WORKSPACE=${{ github.workspace }}
  merge:
    name: Merge manifests
    needs: build
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Merge multi-arch manifest
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          IMAGE="ghcr.io/chalharu/nerust-ci:${IMAGE_TAG}"
          docker buildx imagetools create \
            --tag "${IMAGE}" \
            "${IMAGE}-amd64" \
            "${IMAGE}-arm64"

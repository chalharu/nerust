name: SonarCloud
on:
  workflow_call:
    inputs:
      ci-image-tag:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
permissions:
  contents: read
jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/chalharu/nerust-ci:${{ inputs.ci-image-tag }}
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_TERM_COLOR: always
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: "true"
          workspaces: |
            . -> target
            . -> target/llvm-cov-target
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --exclude nerust_rom_test --features tao,wgpu --lcov --output-path coverage/lcov.info
          workspace_root="${PWD%/}/"
          sed -i "s#^SF:${workspace_root}#SF:#" coverage/lcov.info
      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# CI workflow — runs on every push to master and on pull requests.
#
# Jobs:
#   test        – default workspace unit tests (core, console, persistence)
#   build-tao   – release build of the official Tao frontend
#   build-gtk   – release build of the GTK frontend (build-health gate)
#
# ROM regression tests are intentionally excluded here because they require
# optional ROM assets (~9 min). Run them locally with:
#   cargo test -p nerust_rom_test --release

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -------------------------------------------------------------------------
  # Core unit tests (fast, no GUI)
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default members)
        run: cargo clippy --quiet

      - name: Unit tests (default members)
        run: cargo test --quiet

      - name: Support crate tests
        run: |
          cargo test -p nerust_cartridge_data --lib --quiet
          cargo test -p nerust_screen_buffer --lib --quiet
          cargo test -p nerust_screen_filter --lib --quiet
          cargo test -p nerust_timer --lib --quiet

  # -------------------------------------------------------------------------
  # Official frontend: Tao (Linux x86_64)
  # -------------------------------------------------------------------------
  build-tao:
    name: Build Tao (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libopenal-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tao-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tao-

      - name: Build nerust_tao (release)
        run: cargo build -p nerust_tao --release --quiet

  # -------------------------------------------------------------------------
  # GTK frontend build-health gate (not a release artifact)
  # -------------------------------------------------------------------------
  build-gtk:
    name: Build GTK (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libepoxy-dev \
            libopenal-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gtk-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-gtk-

      - name: Build nerust_gtk (release)
        run: cargo build -p nerust_gtk --release --quiet

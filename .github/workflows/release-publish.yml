name: Publish release
on:
  push:
    branches: [release]
jobs:
  publish:
    if: ${{ github.event.created == false }}
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Read release metadata
        id: release_meta
        run: bash packaging/release/release_flow.sh workspace-metadata >> "$GITHUB_OUTPUT"
      - name: Write release notes
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: bash packaging/release/release_flow.sh release-notes "${VERSION}" --output release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            exit 0
          fi
          gh release create "${TAG_NAME}" --target "${TARGET_SHA}" --title "${TAG_NAME}" --notes-file release-notes.md
  publish-assets:
    name: Publish release assets
    needs: [publish]
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-artifacts.yml
    secrets:
      ANDROID_CERTIFICATE: ${{ secrets.ANDROID_CERTIFICATE }}
      ANDROID_PRIVATE_KEY: ${{ secrets.ANDROID_PRIVATE_KEY }}
      ANDROID_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_PRIVATE_KEY_PASSWORD }}
    with:
      publish_release: true
      ref: ${{ github.sha }}
      tag_name: ${{ needs.publish.outputs.tag_name }}

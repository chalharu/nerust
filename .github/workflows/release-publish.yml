# yamllint disable rule:line-length
name: Publish release
on:
  push:
    tags:
      - v*.*.*
permissions:
  contents: read
jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release_meta.outputs.release_id }}
      upload_url: ${{ steps.release_meta.outputs.upload_url }}
      target_commitish: ${{ steps.release_meta.outputs.target_commitish }}
      version: ${{ steps.tag_meta.outputs.version }}
      tag_name: ${{ steps.tag_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Authenticate git fetches
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "non-release tag ${TAG_NAME}" >&2
            exit 1
          fi
          git fetch origin master
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "tag ${TAG_NAME} is not on master" >&2
            exit 1
          fi
      - name: Determine version from tag
        id: tag_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "non-release tag ${TAG_NAME}" >&2
            exit 1
          fi
      - name: Write release notes
        env:
          VERSION: ${{ steps.tag_meta.outputs.version }}
        run: bash packaging/release/release_flow.sh release-notes "${VERSION}" --output release-notes.md
      - name: Create GitHub release
        id: release_meta
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_tsv="$(gh api "repos/${GH_REPO}/releases" --paginate --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | [.id, (.upload_url | sub(\"\\\\{.*$\"; \"\")), .target_commitish] | @tsv" | head -n 1 || true)"
          if [[ -z "${release_tsv}" ]]; then
            release_tsv="$(gh api -X POST "repos/${GH_REPO}/releases" \
              -f tag_name="${TAG_NAME}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="${TAG_NAME}" \
              -f body="$(<release-notes.md)" \
              -f draft=true \
              --jq '[.id, (.upload_url | sub("\\{.*$"; "")), .target_commitish] | @tsv')"
          fi

          IFS=$'\t' read -r release_id upload_url release_target <<< "${release_tsv}"
          if [[ -z "${release_id}" || -z "${upload_url}" ]]; then
            echo "failed to resolve release metadata for ${TAG_NAME}" >&2
            exit 1
          fi
          if [[ "${release_target}" != "${GITHUB_SHA}" ]]; then
            echo "release tag target ${release_target} does not match build commit ${GITHUB_SHA}" >&2
            exit 1
          fi

          {
            printf 'release_id=%s\n' "${release_id}"
            printf 'upload_url=%s\n' "${upload_url}"
            printf 'target_commitish=%s\n' "${release_target}"
          } >> "$GITHUB_OUTPUT"
  release-artifacts:
    name: Release artifacts
    needs: [publish]
    permissions:
      contents: write
    uses: ./.github/workflows/release-artifacts.yml
    with:
      publish_release: true
      ref: ${{ github.sha }}
      release_id: ${{ needs.publish.outputs.release_id }}
      upload_url: ${{ needs.publish.outputs.upload_url }}
      target_commitish: ${{ needs.publish.outputs.target_commitish }}
      version: ${{ needs.publish.outputs.version }}
      tag_name: ${{ github.ref_name }}
    secrets:
      ANDROID_CERTIFICATE: ${{ secrets.ANDROID_CERTIFICATE }}
      ANDROID_PRIVATE_KEY: ${{ secrets.ANDROID_PRIVATE_KEY }}
      ANDROID_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_PRIVATE_KEY_PASSWORD }}

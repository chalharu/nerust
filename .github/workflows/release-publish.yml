# yamllint disable rule:line-length
name: Publish release
on:
  push:
    tags:
      - v*.*.*
permissions:
  contents: read
jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag_meta.outputs.version }}
      tag_name: ${{ steps.tag_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Authenticate git fetches
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "non-release tag ${TAG_NAME}" >&2
            exit 1
          fi
          git fetch origin master
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "tag ${TAG_NAME} is not on master" >&2
            exit 1
          fi
      - name: Determine version from tag
        id: tag_meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "non-release tag ${TAG_NAME}" >&2
            exit 1
          fi
      - name: Write release notes
        env:
          VERSION: ${{ steps.tag_meta.outputs.version }}
        run: bash packaging/release/release_flow.sh release-notes "${VERSION}" --output release-notes.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            exit 0
          fi
          gh release create "${TAG_NAME}" --target "${GITHUB_SHA}" --title "${TAG_NAME}" --notes-file release-notes.md --draft
  release-artifacts:
    name: Release artifacts
    needs: [publish]
    permissions:
      contents: write
    uses: ./.github/workflows/release-artifacts.yml
    with:
      publish_release: true
      ref: ${{ github.sha }}
      version: ${{ needs.publish.outputs.version }}
      tag_name: ${{ github.ref_name }}
    secrets:
      ANDROID_CERTIFICATE: ${{ secrets.ANDROID_CERTIFICATE }}
      ANDROID_PRIVATE_KEY: ${{ secrets.ANDROID_PRIVATE_KEY }}
      ANDROID_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_PRIVATE_KEY_PASSWORD }}

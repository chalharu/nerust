[graph]
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
ignore = [
  # GTK3 support is intentionally retained; the GTK3 Rust bindings have no patched line.
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  # The retained OpenAL backend depends on alto, whose latest release still pulls these crates.
  "RUSTSEC-2021-0134",
  "RUSTSEC-2022-0040",
  # GTK3 macro dependencies have no patched release in the GTK3 line.
  "RUSTSEC-2024-0370",
]

[bans]
multiple-versions = "warn"

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[workspace]
resolver = "3"
members = [
  "backend/opengl",
  "backend/wgpu",
  "cartridge/data",
  "console",
  "contract/audio",
  "contract/core",
  "contract/device",
  "contract/controller_runtime",
  "contract/mirror",
  "contract/options",
  "contract/persistence",
  "contract/rom",
  "contract/settings",
  "core",
  "nes/device",
  "input/schema",
  "input/nes",
  "input/nes_runtime",
  "persistence",
  "rom_test",
  "gui/frontends/android",
  "gui/frontends/gtk",
  "gui/frontends/tao",
  "gui/shared/runtime",
  "gui/shared/shell",
  "gui/shared/session",
  "nes_ntsc",
  "screen/buffer",
  "screen/filter",
  "screen/glwrap",
  "screen/logical",
  "screen/opengl",
  "screen/physical",
  "screen/rgb",
  "screen/wgpu",
  "screen/video",
  "serialize",
  "sound/openal",
  "sound/filter",
  "sound/traits",
  "snes/core",
  "snes/render",
  "snes/rom_test",
  "sound/android",
  "timer",
  "util/crc64_hasher",
]
default-members = ["core", "persistence", "console"]

[profile.release]
debug = false

[profile.release.package.nerust_core]
codegen-units = 1

[workspace.package]
version = "0.1.0-dev"
authors = ["chalharu"]
description = "NES emulator written in Rust"
license = "MPL-2.0"
repository = "https://github.com/chalharu/nerust"
homepage = "https://github.com/chalharu/nerust"
edition = "2024"
rust-version = "1.89"

[workspace.dependencies]
alto = { version = "=3.0.4" }
android_logger = { version = "=0.15.1" }
bitflags = { version = "=2.13.0", features = ["serde"] }
clap = { version = "=4.6.1" }
cpal = { version = "=0.17.3" }
crc = { version = "=3.4.0" }
directories = { version = "=6.0.0" }
epoxy = { version = "=0.1.0" }
fs2 = { version = "=0.4.3" }
gdk = { version = "=0.11.2", package = "gdk4" }
gio = { version = "=0.22.6" }
gl = { version = "=0.14.0" }
gtk = { version = "=0.11.3", package = "gtk4" }
hound = { version = "=3.5.1" }
iced = { version = "=0.14.0" }
jni = { version = "=0.22.4" }
lazy_static = { version = "=1.5.0" }
libc = { version = "=0.2.186" }
log = { version = "=0.4.32", default-features = false }
muda = { version = "=0.19.2", default-features = false, features = ["gtk"] }
nerust_cartridge_data = { path = "cartridge/data" }
nerust_console = { path = "console" }
nerust_contract_controller_runtime = { path = "contract/controller_runtime" }
nerust_contract_mirror = { path = "contract/mirror" }
nerust_contract_options = { path = "contract/options" }
nerust_contract_persistence = { path = "contract/persistence" }
nerust_contract_rom = { path = "contract/rom" }
nerust_contract_settings = { path = "contract/settings" }
nerust_core = { path = "core" }
nerust_crc64_hasher = { path = "util/crc64_hasher" }
nerust_gui_runtime = { path = "gui/shared/runtime" }
nerust_gui_shell = { path = "gui/shared/shell" }
nerust_gui_session = { path = "gui/shared/session" }
nerust_input_schema = { path = "input/schema" }
nerust_input_nes = { path = "input/nes" }
nerust_input_nes_runtime = { path = "input/nes_runtime" }
nerust_persistence = { path = "persistence" }
nerust_rom_test = { path = "rom_test" }
nerust_backend_opengl = { path = "backend/opengl" }
nerust_backend_wgpu = { path = "backend/wgpu" }
nerust_glwrap = { path = "screen/glwrap" }
nerust_screen_buffer = { path = "screen/buffer" }
nerust_screen_filter = { path = "screen/filter" }
nerust_screen_logical = { path = "screen/logical" }
nerust_screen_opengl = { path = "screen/opengl" }
nerust_screen_physical = { path = "screen/physical" }
nerust_screen_rgb = { path = "screen/rgb" }
nerust_screen_wgpu = { path = "screen/wgpu" }
nerust_screen_video = { path = "screen/video" }
nerust_snes_core = { path = "snes/core" }
nerust_snes_render = { path = "snes/render" }
nerust_snes_rom_test = { path = "snes/rom_test" }
nerust_serialize = { path = "serialize" }
nerust_sound_openal = { path = "sound/openal" }
nerust_sound_android = { path = "sound/android" }
nerust_sound_traits = { path = "sound/traits" }
nerust_soundfilter = { path = "sound/filter" }
nerust_timer = { path = "timer" }
nes_ntsc = { path = "nes_ntsc" }
pollster = { version = "=0.4.0" }
png = { version = "=0.18.1" }
rmp-serde = { version = "=1.3.1" }
raw-window-handle = { version = "=0.6.2" }
rfd = { version = "=0.17.2" }
serde = { version = "=1.0.228", default-features = false }
serde_bytes = { version = "=0.11.19" }
serde_derive = { version = "=1.0.228", default-features = false }
serde_yaml = { version = "=0.9.34" }
sevenz-rust2 = { version = "=0.21.0", default-features = false }
shared_library = { version = "=0.1.9" }
simple_logger = { version = "=5.2.0" }
strum = { version = "=0.28.0" }
strum_macros = { version = "=0.28.0" }
tao = { version = "=0.35.3" }
thiserror = { version = "=2.0.18" }
typetag = { version = "=0.2.22" }
wgpu = { version = "=29.0.3" }
winit = { version = "=0.30.13" }
zip = { version = "=8.6.0", default-features = false, features = ["deflate"] }

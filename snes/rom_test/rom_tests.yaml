    max_steps: 30000
    check_interval_steps: 30000
    expected_screen_hash: "0x173A1A92F44C3947"
    assertions:
      - kind: cgram_u16
        address: "0x0002"
        expected: "0x0C87"
      - kind: vram_u8
        address: "0x0000"
        expected: "0x18"
      - kind: vram_u8
        address: "0x0004"
        expected: "0x1A"
      - kind: vram_u8
        address: "0x2003"
        expected: "0x00"
      - kind: vram_u8
        address: "0x2005"
        expected: "0x00"
      - kind: vram_u8
        address: "0x200F"
        expected: "0x00"
      - kind: oam_u16
        address: "0x0000"
        expected: "0x5040"
      - kind: oam_u16
        address: "0x0004"
        expected: "0x5060"
      - kind: oam_u16
        address: "0x0200"
        expected: "0xAAAA"
      - kind: oam_u16
        address: "0x0202"
        expected: "0x5555"
